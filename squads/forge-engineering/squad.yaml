name: "Forge Engineering Squad"
code: "forge-engineering"
description: >
  Squad completo de engenharia de software que cobre todo o ciclo de vida —
  desde a engenharia de requisitos e análise reversa até a publicação em
  produção e sustentação. Inclui arquiteto, tech lead, analistas de negócio,
  consultor financeiro (Bacen/BIAN/compliance), desenvolvedores, QAs, tech
  writer e gerente de projeto com reports automatizados em cada checkpoint.
icon: "🏗️"
version: "1.0.0"
created: "2026-03-16"
project_type: "fullstack"
delivery_model: "greenfield"

tech_stack:
  backend: "Node.js / Python / Java (configurable)"
  frontend: "React / Angular / Vue (configurable)"
  database: "PostgreSQL / MongoDB (configurable)"
  infra: "AWS / Azure / GCP (configurable)"
  ci_cd: "GitHub Actions / GitLab CI / Jenkins"

company: "_forgesquad/_memory/company.md"
preferences: "_forgesquad/_memory/preferences.md"
memory: "_memory/memories.md"

target_audience: "Engineering teams building enterprise software"
platform: "Software Delivery"
performance_mode: "quality-first"

skills:
  - web_search
  - web_fetch
  - devin
  - copilot
  - stackspot
  - kiro
  - jira-sync
  - sonarqube

data:
  - pipeline/data/coding-standards.md
  - pipeline/data/architecture-guidelines.md
  - pipeline/data/testing-strategy.md
  - pipeline/data/definition-of-done.md
  - pipeline/data/definition-of-ready.md
  - pipeline/data/deployment-checklist.md

