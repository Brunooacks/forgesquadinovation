name: "PromptPilot Engineering Squad"
code: "promptpilot"
description: >
  Squad de engenharia para o PromptPilot — plataforma hibrida (CLI + Web) que
  serve como repositorio inteligente de prompts para engenharia de software,
  painel de gestao e consolidacao, e robo gerador de agentes e scripts para
  modernizacao de sistemas. MVP focado em entregar valor rapido para o time.
icon: "🤖"
version: "1.0.0"
created: "2026-03-18"
project_type: "fullstack"
delivery_model: "greenfield"

tech_stack:
  cli: "Node.js + Commander.js + TypeScript"
  backend: "NestJS + TypeScript"
  frontend: "Next.js + React + Tailwind CSS"
  database: "PostgreSQL + Git-based (prompts as .md)"
  llm: "Claude API (primary) + OpenAI (fallback)"
  templates: "YAML + Handlebars"
  ci_cd: "GitHub Actions"

company: "_forgesquad/_memory/company.md"
preferences: "_forgesquad/_memory/preferences.md"
memory: "_memory/memories.md"

target_audience: "Times de engenharia de software que buscam padronizar e acelerar uso de AI"
platform: "CLI + Web Dashboard"
performance_mode: "speed-first"

skills:
  - web_search
  - web_fetch

data:
  - pipeline/data/coding-standards.md
  - pipeline/data/prompt-categories.md
  - pipeline/data/modernization-patterns.md
  - pipeline/data/template-spec.md

