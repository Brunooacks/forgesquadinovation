name: "Pipeline — TokenOps Engineering Squad"
version: "1.0.0"
created: "2026-03-16"
squad: "tokenops"

description: >
  Pipeline completo de engenharia para o TokenOps — plataforma SaaS de AI FinOps
  para monitoramento, otimizacao e reducao de custos de LLMs. Cobre os 6 modulos
  do produto (AI Gateway, Dashboard, Token Estimation, Model Recommendation,
  Cost Explorer, Alerts & Budgets) com foco no MVP (Gateway + Dashboard +
  Token Estimation + Model Recommendation). Checkpoints garantem aprovacao
  humana em decisoes criticas. O Arquiteto participa em todas as fases como
  guardiao da qualidade arquitetural.

mode: "quality-first"

steps:
  # === FASE 1: REQUISITOS ===
  - id: step-01
    name: "Briefing do Projeto TokenOps"
    type: checkpoint
    file: steps/step-01-project-briefing.md
    phase: requirements

  - id: step-02
    name: "Elicitacao de Requisitos — Modulos TokenOps"
    type: agent
    agent: business-analyst
    tasks:
      - elicit-requirements
      - write-user-stories
    file: steps/step-02-requirements.md
    depends_on: step-01
    phase: requirements

  - id: step-03
    name: "Aprovacao dos Requisitos"
    type: checkpoint
    file: steps/step-03-approve-requirements.md
    depends_on: step-02
    phase: requirements

  # === FASE 2: ARQUITETURA ===
  - id: step-04
    name: "Design de Arquitetura — AI Gateway & Plataforma"
    type: agent
    agent: architect
    tasks:
      - design-architecture
      - create-adr
    file: steps/step-04-architecture-design.md
    depends_on: step-03
    phase: architecture

  - id: step-05
    name: "Revisao Arquitetural"
    type: architectural_review
    file: steps/step-05-architecture-review.md
    depends_on: step-04
    phase: architecture

  # === FASE 3: PLANEJAMENTO ===
  - id: step-06
    name: "Sprint Planning — MVP TokenOps"
    type: agent
    agent: tech-lead
    tasks:
      - plan-sprint
    file: steps/step-06-sprint-planning.md
    depends_on: step-05
    phase: planning

  - id: step-07
    name: "Definicao de Estrategia de Testes"
    type: agent
    agent: qa-engineer
    tasks:
      - define-test-strategy
    file: steps/step-07-test-strategy.md
    depends_on: step-06
    phase: planning

  - id: step-08
    name: "Aprovacao do Plano de Sprint"
    type: checkpoint
    file: steps/step-08-approve-plan.md
    depends_on: step-07
    phase: planning

  # === FASE 4: IMPLEMENTACAO ===
  - id: step-09
    name: "Implementacao Backend — NestJS APIs, Gateway Proxy, LLM Integracoes"
    type: agent
    agent: dev-backend
    tasks:
      - implement-api
      - implement-gateway-proxy
      - implement-llm-integrations
      - model-database
      - write-unit-tests
    file: steps/step-09-backend-impl.md
    depends_on: step-08
    phase: implementation

  - id: step-10
    name: "Implementacao Frontend — Next.js Dashboard & Cost Explorer"
    type: agent
    agent: dev-frontend
    tasks:
      - implement-ui
      - integrate-api
      - write-component-tests
    file: steps/step-10-frontend-impl.md
    depends_on: step-09
    phase: implementation

  - id: step-11
    name: "Checkpoint de Implementacao"
    type: checkpoint
    file: steps/step-11-impl-checkpoint.md
    depends_on: step-10
    phase: implementation

  # === FASE 5: QUALIDADE ===
  - id: step-12
    name: "Testes Automatizados — Estimacao de Tokens, Proxy, Recomendacao"
    type: agent
    agent: qa-engineer
    tasks:
      - write-test-cases
      - automate-tests
      - run-regression
    file: steps/step-12-automated-tests.md
    depends_on: step-11
    phase: quality

  - id: step-13
    name: "Testes de Performance — Gateway Proxy & Analytics Pipeline"
    type: agent
    agent: qa-engineer
    tasks:
      - performance-test
    file: steps/step-13-performance-tests.md
    depends_on: step-12
    phase: quality
    optional: true

  # === FASE 6: CODE REVIEW ===
  - id: step-14
    name: "Code Review"
    type: code_review
    agent: tech-lead
    tasks:
      - review-code
    file: steps/step-14-code-review.md
    depends_on: step-13
    on_reject: step-09
    max_review_cycles: 3
    phase: review

  - id: step-15
    name: "Revisao Arquitetural do Codigo"
    type: agent
    agent: architect
    tasks:
      - review-architecture
    file: steps/step-15-arch-code-review.md
    depends_on: step-14
    phase: review

  # === FASE 7: DOCUMENTACAO ===
  - id: step-16
    name: "Documentacao Tecnica — API Docs, SDK Guide, Integration Guides"
    type: agent
    agent: tech-writer
    tasks:
      - write-api-docs
      - write-sdk-guide
      - write-integration-guides
      - write-runbook
      - write-release-notes
    file: steps/step-16-documentation.md
    depends_on: step-15
    phase: documentation

  # === FASE 8: DEPLOY ===
  - id: step-17
    name: "Go/No-Go para Producao"
    type: checkpoint
    file: steps/step-17-go-nogo.md
    depends_on: step-16
    phase: deployment

  - id: step-18
    name: "Deploy SaaS em Producao"
    type: agent
    agent: dev-backend
    tasks:
      - create-integration
    file: steps/step-18-deploy.md
    depends_on: step-17
    phase: deployment

  # === FASE 9: SUSTENTACAO ===
  - id: step-19
    name: "Relatorio Final e Handover para Sustentacao"
    type: agent
    agent: project-manager
    tasks:
      - generate-status-report
    file: steps/step-19-final-report.md
    depends_on: step-18
    phase: sustaining

  - id: step-20
    name: "Encerramento"
    type: checkpoint
    file: steps/step-20-closure.md
    depends_on: step-19
    phase: sustaining

checkpoints:
  - step-01  # Briefing do projeto TokenOps
  - step-03  # Aprovacao requisitos (6 modulos, MVP scope)
  - step-05  # Revisao arquitetural (AI Gateway, LLM routing, cost engine)
  - step-08  # Aprovacao plano de sprint (MVP deliverables)
  - step-11  # Checkpoint implementacao (Gateway + Dashboard + Estimation + Recommendation)
  - step-17  # Go/No-Go producao SaaS
  - step-20  # Encerramento

phases:
  - name: requirements
    label: "Requisitos"
    icon: "📋"
  - name: architecture
    label: "Arquitetura"
    icon: "🏗️"
  - name: planning
    label: "Planejamento"
    icon: "📅"
  - name: implementation
    label: "Implementação"
    icon: "⚙️"
  - name: quality
    label: "Qualidade"
    icon: "🔍"
  - name: review
    label: "Code Review"
    icon: "👀"
  - name: documentation
    label: "Documentação"
    icon: "📝"
  - name: deployment
    label: "Deploy"
    icon: "🚀"
  - name: sustaining
    label: "Sustentação"
    icon: "🔧"

output:
  artifacts:
    - output/requirements/user-stories.md
    - output/requirements/acceptance-criteria.md
    - output/architecture/architecture-design.md
    - output/architecture/adrs/
    - output/planning/sprint-backlog.md
    - output/planning/test-strategy.md
    - output/implementation/backend/
    - output/implementation/frontend/
    - output/quality/test-report.md
    - output/quality/performance-report.md
    - output/review/code-review-report.md
    - output/documentation/api-docs.md
    - output/documentation/sdk-guide.md
    - output/documentation/integration-guides.md
    - output/documentation/runbook.md
    - output/documentation/release-notes.md
    - output/deployment/deploy-report.md
    - output/reports/final-report.md
