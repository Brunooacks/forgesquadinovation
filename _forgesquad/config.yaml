# ForgeSquad Framework Configuration
version: "2.0.0"
release_date: "2026-03-22"
codename: "Prometheus"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CAMADA 1: GOVERNANCE (invisivel, automatica)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

governance:
  # Production output standard — enforced automaticamente
  production_standard: true

  # Audit trail — compliance logging em todos os squads
  audit_trail: true
  audit_retention_years: 5

  # Intelligence embedded — injected nos agentes automaticamente
  # O usuario nao precisa saber que existe; torna os agentes melhores
  embedded_intelligence:
    - _forgesquad/core/intelligence/software-architecture.md    # Fowler, GoF, DDD, SOLID
    - _forgesquad/core/intelligence/cryptography-security.md    # Encryption, zero trust, LGPD
    - _forgesquad/core/best-practices/                          # 8 dominios de boas praticas

  # Backup automatico — snapshots e versionamento em cada step/checkpoint
  backup:
    enabled: true
    auto_commit: true
    auto_snapshot: true
    max_local_snapshots: 10
    snapshot_triggers: [checkpoint, phase_complete, sprint_complete, before_destructive]
    retention:
      never_delete: [release, final_report]
    remote:
      enabled: false

  # Dev Journey — gera roadmap e release plan automaticamente
  dev_journey: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CAMADA 2: SQUAD (o time)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Model Tier Configuration
# powerful = deep reasoning (Architect, Tech Lead, Devs)
# fast = pattern-based work (Tech Writer, PM)
# Adaptavel a qualquer provider de IA
models:
  orchestrator: powerful
  architect: powerful
  tech_lead: powerful
  business_analyst: powerful
  developer_backend: powerful
  developer_frontend: powerful
  qa_engineer: powerful
  sre_engineer: powerful
  devops_engineer: powerful
  tech_writer: fast
  finance_advisor: powerful
  project_manager: fast

# Metodologias de gestao — enforced por politica da empresa
# O PM e Tech Lead seguem os rituais automaticamente
methodologies:
  default: scrum
  available: [default, waterfall, scrum, kanban]

  scrum:
    sprint_duration_weeks: 2
    ceremonies:
      - name: "Sprint Planning"
        when: "inicio_sprint"
        agent: tech-lead
        output: "sprint-backlog.md"
        duration_minutes: 60
      - name: "Daily Standup"
        when: "diario"
        agent: project-manager
        output: "daily-report.md"
        duration_minutes: 15
        template: |
          ## Daily Standup — Sprint {sprint_number} | Day {day}
          ### Por Agente:
          - **O que fez ontem:** {done}
          - **O que fara hoje:** {todo}
          - **Impedimentos:** {blockers}
      - name: "Sprint Review"
        when: "fim_sprint"
        agent: project-manager
        output: "sprint-review.md"
        duration_minutes: 45
        includes: [demo, metrics, stakeholder_feedback]
      - name: "Sprint Retrospective"
        when: "fim_sprint"
        agent: tech-lead
        output: "sprint-retro.md"
        duration_minutes: 30
        template: |
          ## Retrospectiva — Sprint {sprint_number}
          ### O que foi bem:
          ### O que pode melhorar:
          ### Acoes para proximo sprint:
      - name: "Backlog Refinement"
        when: "meio_sprint"
        agent: business-analyst
        output: "refinement-notes.md"
        duration_minutes: 45
    governance_reports:
      - name: "Sprint Burndown"
        frequency: "diario"
        agent: project-manager
      - name: "Velocity Report"
        frequency: "fim_sprint"
        agent: project-manager
      - name: "Quality Dashboard"
        frequency: "fim_sprint"
        agent: qa-engineer
      - name: "Risk Register"
        frequency: "semanal"
        agent: project-manager

  kanban:
    wip_limits:
      backlog: 20
      in_progress: 3
      review: 2
      done: unlimited
    ceremonies:
      - name: "Standup"
        when: "diario"
        agent: project-manager
        output: "daily-report.md"
        duration_minutes: 15
      - name: "Replenishment Meeting"
        when: "semanal"
        agent: tech-lead
        output: "replenishment-notes.md"
        duration_minutes: 30
      - name: "Delivery Review"
        when: "quinzenal"
        agent: project-manager
        output: "delivery-review.md"
        duration_minutes: 45
    governance_reports:
      - name: "Cumulative Flow Diagram"
        frequency: "diario"
        agent: project-manager
      - name: "Lead Time Report"
        frequency: "semanal"
        agent: project-manager
      - name: "Throughput Report"
        frequency: "semanal"
        agent: project-manager

  waterfall:
    phases: [requirements, design, implementation, testing, deployment, maintenance]
    ceremonies:
      - name: "Phase Gate Review"
        when: "fim_fase"
        agent: project-manager
        output: "phase-gate-report.md"
        duration_minutes: 60
        requires_approval: true
      - name: "Status Report"
        when: "semanal"
        agent: project-manager
        output: "weekly-status.md"
        duration_minutes: 30
      - name: "Steering Committee"
        when: "quinzenal"
        agent: project-manager
        output: "steering-report.md"
        duration_minutes: 60
    governance_reports:
      - name: "Gantt Progress"
        frequency: "semanal"
        agent: project-manager
      - name: "Milestone Tracker"
        frequency: "semanal"
        agent: project-manager
      - name: "Budget Burn Report"
        frequency: "quinzenal"
        agent: finance-advisor

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ESTIMATIVAS DE TEMPO E CUSTO DE TOKENS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Baseado em projetos reais executados com Claude Opus/Sonnet
# Precos referencia: Opus $15/1M input, $75/1M output
#                    Sonnet $3/1M input, $15/1M output

token_estimates:
  # Por fase do pipeline (projeto medio ~fullstack)
  phases:
    estimation:
      duration_minutes: 5-10
      tokens_input: 8000
      tokens_output: 4000
      estimated_cost_usd: 0.42
      model: powerful

    requirements:
      duration_minutes: 15-30
      tokens_input: 25000
      tokens_output: 15000
      estimated_cost_usd: 1.50
      model: powerful

    architecture:
      duration_minutes: 20-40
      tokens_input: 35000
      tokens_output: 20000
      estimated_cost_usd: 2.03
      model: powerful

    planning:
      duration_minutes: 10-20
      tokens_input: 18000
      tokens_output: 10000
      estimated_cost_usd: 1.02
      model: powerful

    implementation:
      duration_minutes: 30-90
      tokens_input: 80000
      tokens_output: 50000
      estimated_cost_usd: 4.95
      model: powerful
      notes: "Ralph Loop pode multiplicar por 2-3x dependendo das iteracoes"

    quality:
      duration_minutes: 15-30
      tokens_input: 30000
      tokens_output: 18000
      estimated_cost_usd: 1.80
      model: powerful

    review:
      duration_minutes: 10-20
      tokens_input: 20000
      tokens_output: 8000
      estimated_cost_usd: 0.90
      model: powerful

    documentation:
      duration_minutes: 10-20
      tokens_input: 15000
      tokens_output: 12000
      estimated_cost_usd: 1.13
      model: fast
      notes: "Usa modelo fast — custo reduzido"

    deployment:
      duration_minutes: 10-15
      tokens_input: 12000
      tokens_output: 6000
      estimated_cost_usd: 0.63
      model: powerful

    sustaining:
      duration_minutes: 5-10
      tokens_input: 10000
      tokens_output: 5000
      estimated_cost_usd: 0.53
      model: fast

  # Totais estimados por complexidade de projeto
  project_totals:
    small:
      description: "Landing page, API simples, CRUD"
      total_duration: "1-3 horas"
      total_tokens: "~300K"
      estimated_cost: "$5-15 USD"
      estimated_cost_brl: "R$25-75"

    medium:
      description: "Fullstack app, microservicos, integracao"
      total_duration: "3-8 horas"
      total_tokens: "~800K"
      estimated_cost: "$15-40 USD"
      estimated_cost_brl: "R$75-200"

    large:
      description: "Enterprise, multi-modulo, compliance"
      total_duration: "8-24 horas"
      total_tokens: "~2M"
      estimated_cost: "$40-120 USD"
      estimated_cost_brl: "R$200-600"

    enterprise:
      description: "Plataforma completa, regulatorio, multi-squad"
      total_duration: "24-80 horas"
      total_tokens: "~5M+"
      estimated_cost: "$120-400 USD"
      estimated_cost_brl: "R$600-2000"

  # Custo de ceremonias por metodologia (por sprint/ciclo)
  methodology_overhead:
    scrum:
      ceremonies_per_sprint: 5
      tokens_per_ceremony: 5000
      overhead_cost_per_sprint: "$1.50 USD"
      overhead_percentage: "~5%"

    kanban:
      ceremonies_per_week: 3
      tokens_per_ceremony: 3000
      overhead_cost_per_week: "$0.70 USD"
      overhead_percentage: "~3%"

    waterfall:
      ceremonies_per_phase: 2
      tokens_per_ceremony: 8000
      overhead_cost_per_phase: "$2.00 USD"
      overhead_percentage: "~4%"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CAMADA 3: EXECUTION (como entregam)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

execution:
  # Ralph Loop — modo padrao dos desenvolvedores
  # Automatico: devs usam iteracoes com quality gates
  ralph_loop:
    enabled: true
    default_max_iterations: 10
    default_quality_gates: [typecheck, lint, test]
    applies_to: [developer_backend, developer_frontend, devops_engineer]

  # Modos de execucao (atribuidos automaticamente por tipo de agente):
  #   inline    → decisoes e design (Architect, Tech Lead, BA)
  #   subagent  → pesquisa e analise (BA, QA, Tech Writer)
  #   ralph-loop → implementacao (Dev Backend, Dev Frontend, DevOps)
  modes:
    inline: [architect, tech_lead, business_analyst, finance_advisor]
    subagent: [qa_engineer, tech_writer, project_manager, sre_engineer]
    ralph_loop: [developer_backend, developer_frontend, devops_engineer]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CAPABILITIES (abstracoes de ferramentas)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# O framework define O QUE precisa.
# A empresa configura QUAL ferramenta usa.
# Desacoplado de vendors especificos.

capabilities:
  autonomous_coding:
    description: "Implementacao autonoma de features completas"
    default_provider: claude-code
    supported_providers:
      - id: claude-code
        name: "Claude Code"
        type: cli
        status: ready
      - id: devin
        name: "Devin"
        type: autonomous
        status: ready
      - id: codex
        name: "OpenAI Codex"
        type: api
        status: ready
      - id: cursor
        name: "Cursor"
        type: ide
        status: ready
      - id: windsurf
        name: "Windsurf"
        type: ide
        status: ready
    used_by: [developer_backend, developer_frontend]

  pair_programming:
    description: "Sugestoes inline, code generation, autocomplete"
    default_provider: copilot
    supported_providers:
      - id: copilot
        name: "GitHub Copilot"
        type: ide-extension
        status: ready
      - id: cursor
        name: "Cursor"
        type: ide
        status: ready
      - id: windsurf
        name: "Windsurf"
        type: ide
        status: ready
      - id: kiro
        name: "Kiro"
        type: ide
        status: ready
      - id: codeium
        name: "Codeium"
        type: ide-extension
        status: ready
    used_by: [developer_backend, developer_frontend, tech_lead]

  code_analysis:
    description: "Analise estatica, quality gates, security scanning"
    default_provider: sonarqube
    alternatives: [codeclimate, snyk, semgrep]
    used_by: [qa_engineer, tech_lead, architect]

  infrastructure:
    description: "Templates IaC, provisioning, cloud management"
    default_provider: terraform
    alternatives: [pulumi, bicep, cloudformation, stackspot]
    used_by: [devops_engineer, architect]

  project_sync:
    description: "Sincronizacao de status, metricas, backlog"
    default_provider: jira
    alternatives: [linear, azure-devops, github-projects, clickup]
    used_by: [project_manager, tech_lead]

  requirements:
    description: "Geracao de specs, user stories, task breakdown"
    default_provider: native
    alternatives: [kiro]
    used_by: [business_analyst, architect]

  monitoring:
    description: "Observability, alerting, dashboards"
    default_provider: datadog
    alternatives: [grafana, cloudwatch, newrelic, prometheus]
    used_by: [sre_engineer, devops_engineer]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SCALE (para 3000+ devs)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

scale:
  # Squad templates — spin up novo squad em minutos
  templates_dir: _forgesquad/templates/

  # Metrics rollup — lideranca ve progresso de todos os squads
  metrics:
    enabled: true
    rollup: [velocity, quality_score, production_readiness, estimation_accuracy]

  # Governance policies — enforced em todos os squads
  policies:
    min_test_coverage: 80
    require_code_review: true
    require_security_scan: true
    require_architecture_review: true
    max_review_cycles: 3
    require_production_checklist: true
