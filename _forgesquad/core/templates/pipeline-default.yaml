# ForgeSquad Default Pipeline Template
# Generated by ForgeSquad v2.0
#
# This is the standard pipeline for a greenfield full-squad project.
# The Architect agent customizes this based on project needs.
#
# Step types:
#   checkpoint  — pauses for user approval (MANDATORY)
#   agent       — executed by a specific agent
#
# Execution modes (per agent type, overridable per step):
#   inline      — agent works in conversation (Architect, Tech Lead, BA)
#   subagent    — agent works in background (QA, Tech Writer, PM, SRE)
#   ralph-loop  — iterative implementation with quality gates (Devs, DevOps)

steps:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Estimation & Briefing
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-00
    name: "Estimativa de Complexidade e Custo"
    type: agent
    agent: architect
    execution: inline
    phase: estimation
    file: steps/step-00-estimation.md

  - id: step-01
    name: "Checkpoint: Briefing do Projeto"
    type: checkpoint
    phase: briefing
    file: steps/step-01-briefing.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Requirements
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-02
    name: "Elicitacao de Requisitos"
    type: agent
    agent: business-analyst
    execution: inline
    phase: requirements
    file: steps/step-02-requirements.md

  - id: step-03
    name: "User Stories e Criterios de Aceite"
    type: agent
    agent: business-analyst
    execution: inline
    phase: requirements
    file: steps/step-03-user-stories.md

  - id: step-04
    name: "Checkpoint: Aprovacao de Requisitos"
    type: checkpoint
    phase: requirements
    file: steps/step-04-approve-requirements.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Architecture & Design
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-05
    name: "Design de Arquitetura"
    type: agent
    agent: architect
    execution: inline
    phase: architecture
    file: steps/step-05-architecture.md
    best_practice: api-design

  - id: step-06
    name: "Decisoes Arquiteturais (ADRs)"
    type: agent
    agent: architect
    execution: inline
    phase: architecture
    file: steps/step-06-adrs.md

  - id: step-07
    name: "Checkpoint: Aprovacao da Arquitetura"
    type: checkpoint
    phase: architecture
    file: steps/step-07-approve-architecture.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Sprint Planning
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-08
    name: "Sprint Planning e Task Breakdown"
    type: agent
    agent: tech-lead
    execution: inline
    phase: planning
    file: steps/step-08-sprint-planning.md

  - id: step-09
    name: "Checkpoint: Aprovacao do Plano"
    type: checkpoint
    phase: planning
    file: steps/step-09-approve-plan.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Implementation
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-10
    name: "Implementacao Backend"
    type: agent
    agent: dev-backend
    execution: ralph-loop
    phase: implementation
    file: steps/step-10-backend.md
    best_practice: security

  - id: step-11
    name: "Implementacao Frontend"
    type: agent
    agent: dev-frontend
    execution: ralph-loop
    phase: implementation
    file: steps/step-11-frontend.md

  - id: step-12
    name: "Checkpoint: Revisao de Implementacao"
    type: checkpoint
    phase: implementation
    file: steps/step-12-approve-implementation.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Quality Assurance
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-13
    name: "Estrategia de Testes"
    type: agent
    agent: qa-engineer
    execution: subagent
    phase: testing
    file: steps/step-13-test-strategy.md
    best_practice: testing

  - id: step-14
    name: "Execucao de Testes"
    type: agent
    agent: qa-engineer
    execution: subagent
    phase: testing
    file: steps/step-14-test-execution.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Code Review
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-15
    name: "Code Review"
    type: agent
    agent: tech-lead
    execution: inline
    phase: code_review
    file: steps/step-15-code-review.md
    best_practice: code-review
    on_reject: step-10

  - id: step-16
    name: "Revisao Arquitetural"
    type: agent
    agent: architect
    execution: inline
    phase: code_review
    file: steps/step-16-arch-review.md

  - id: step-17
    name: "Checkpoint: Aprovacao de Qualidade"
    type: checkpoint
    phase: code_review
    file: steps/step-17-approve-quality.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Documentation
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-18
    name: "Documentacao Tecnica"
    type: agent
    agent: tech-writer
    execution: subagent
    phase: documentation
    file: steps/step-18-documentation.md
    best_practice: documentation

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Infrastructure & Deployment
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-19
    name: "Setup de Infraestrutura e CI/CD"
    type: agent
    agent: devops-engineer
    execution: ralph-loop
    phase: deployment
    file: steps/step-19-infra-cicd.md
    best_practice: deployment

  - id: step-20
    name: "Observabilidade e Monitoramento"
    type: agent
    agent: sre-engineer
    execution: subagent
    phase: deployment
    file: steps/step-20-observability.md
    best_practice: observability

  - id: step-21
    name: "Checkpoint: Go/No-Go para Deploy"
    type: checkpoint
    phase: deployment
    file: steps/step-21-go-nogo.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE: Release
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: step-22
    name: "Deploy e Validacao"
    type: agent
    agent: devops-engineer
    execution: ralph-loop
    phase: release
    file: steps/step-22-deploy.md

  - id: step-23
    name: "Relatorio Final do Projeto"
    type: agent
    agent: project-manager
    execution: subagent
    phase: release
    file: steps/step-23-final-report.md
