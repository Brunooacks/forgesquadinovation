# ForgeSquad Project Configuration
# Generated by ForgeSquad v2.0
# This template is used when /forgesquad create is run for a new project.
# The Architect agent populates the placeholder values during squad creation.

name: "{project_name}"
code: "{project_code}"
description: "{description}"
icon: "{icon}"
version: "1.0.0"
created: "{date}"

# Project classification
project_type: "{type}"          # greenfield | brownfield | migration | sustaining
delivery_model: "{delivery}"    # greenfield | brownfield | sustaining | migration
methodology: "default"          # default | waterfall | scrum | kanban

# Tech stack — populated by Architect based on discovery
tech_stack:
  language: "{language}"
  framework: "{framework}"
  database: "{database}"
  infrastructure: "{infrastructure}"
  ci_cd: "{ci_cd}"

# Company context references
company:
  context: "_forgesquad/_memory/company.md"
  tech_stack: "_forgesquad/_memory/tech-stack.md"

# Squad memory
memory:
  file: "_memory/memories.md"

# Capabilities — what this squad can do (resolved to providers at runtime)
capabilities:
  - autonomous_coding
  - pair_programming
  - code_analysis

# Embedded intelligence — auto-injected, invisible to agents
intelligence:
  - _forgesquad/core/intelligence/software-architecture.md
  - _forgesquad/core/intelligence/cryptography-security.md

# Agents — populated by Architect based on project needs
# Format: list of agent IDs from the catalog in architect.agent.yaml
agents: []

# Pipeline definition
pipeline:
  file: pipeline/pipeline.yaml

# Output configuration
output_dir: "output/"
reports_dir: "reports/"

# Governance — inherited from config.yaml, can be overridden per squad
governance:
  backup:
    enabled: true
    auto_commit: true
    auto_snapshot: true
  audit_trail: true
