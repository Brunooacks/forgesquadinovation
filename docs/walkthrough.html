<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeSquad — Walkthrough: E-Commerce Project</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#0a0a0a; color:#e2e8f0; overflow-x:hidden; }

  /* Top Bar - Video Player Style */
  .top-bar {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(10,10,10,0.95); backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(99,102,241,0.2);
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 24px; height:50px;
  }
  .top-bar .brand { display:flex; align-items:center; gap:10px; }
  .top-bar .brand span { font-size:1.1rem; font-weight:700; color:#8b5cf6; }
  .top-bar .badge { padding:3px 10px; border-radius:12px; font-size:0.65rem; background:rgba(52,211,153,0.15); color:#6ee7b7; border:1px solid rgba(52,211,153,0.3); font-weight:600; }
  .top-bar .step-label { color:#94a3b8; font-size:0.8rem; }

  /* Progress Timeline */
  .timeline-bar {
    position:fixed; top:50px; left:0; right:0; z-index:99;
    background:#111118; padding:8px 24px; display:flex; align-items:center; gap:6px;
    border-bottom:1px solid rgba(255,255,255,0.05); overflow-x:auto;
  }
  .timeline-dot {
    min-width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:0.6rem; font-weight:700; cursor:pointer; transition:all 0.3s;
    background:rgba(255,255,255,0.05); color:#64748b; border:2px solid transparent;
  }
  .timeline-dot.active { background:#6366f1; color:#fff; border-color:#8b5cf6; transform:scale(1.15); }
  .timeline-dot.done { background:rgba(52,211,153,0.2); color:#6ee7b7; border-color:rgba(52,211,153,0.4); }
  .timeline-dot:hover { transform:scale(1.1); }
  .timeline-line { flex:1; height:2px; background:rgba(255,255,255,0.05); min-width:8px; }
  .timeline-line.done { background:rgba(52,211,153,0.3); }

  /* Main Content */
  .main { margin-top:90px; padding:20px 24px 80px; max-width:1200px; margin-left:auto; margin-right:auto; }

  /* Step Container */
  .step { display:none; animation:fadeIn 0.4s ease; }
  .step.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Step Header */
  .step-header { margin-bottom:20px; }
  .step-phase {
    display:inline-block; padding:4px 12px; border-radius:12px; font-size:0.65rem;
    font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px;
  }
  .step-phase.config { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); }
  .step-phase.estimativa { background:rgba(245,158,11,0.15); color:#fbbf24; border:1px solid rgba(245,158,11,0.3); }
  .step-phase.requisitos { background:rgba(16,185,129,0.15); color:#6ee7b7; border:1px solid rgba(16,185,129,0.3); }
  .step-phase.arquitetura { background:rgba(168,85,247,0.15); color:#c4b5fd; border:1px solid rgba(168,85,247,0.3); }
  .step-phase.implementacao { background:rgba(59,130,246,0.15); color:#93c5fd; border:1px solid rgba(59,130,246,0.3); }
  .step-phase.qualidade { background:rgba(236,72,153,0.15); color:#f9a8d4; border:1px solid rgba(236,72,153,0.3); }
  .step-phase.deploy { background:rgba(52,211,153,0.15); color:#6ee7b7; border:1px solid rgba(52,211,153,0.3); }
  .step-phase.dashboard { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); }

  .step-title { font-size:1.6rem; font-weight:700; color:#e2e8f0; margin-bottom:6px; }
  .step-desc { font-size:0.9rem; color:#94a3b8; line-height:1.5; }

  /* Terminal */
  .terminal {
    background:#0d1117; border:1px solid #21262d; border-radius:10px;
    margin:16px 0; overflow:hidden;
  }
  .terminal-header {
    background:#161b22; padding:8px 14px; display:flex; align-items:center; gap:6px;
    border-bottom:1px solid #21262d;
  }
  .terminal-dot { width:10px; height:10px; border-radius:50%; }
  .terminal-dot.r { background:#ff5f56; }
  .terminal-dot.y { background:#ffbd2e; }
  .terminal-dot.g { background:#27c93f; }
  .terminal-title { margin-left:10px; font-size:0.7rem; color:#8b949e; font-family:'JetBrains Mono',monospace; }
  .terminal-body {
    padding:16px; font-family:'JetBrains Mono',monospace; font-size:0.75rem;
    line-height:1.7; color:#c9d1d9; max-height:400px; overflow-y:auto;
  }
  .terminal-body .cmd { color:#79c0ff; }
  .terminal-body .out { color:#8b949e; }
  .terminal-body .success { color:#3fb950; }
  .terminal-body .warn { color:#d29922; }
  .terminal-body .agent { color:#bc8cff; font-weight:600; }
  .terminal-body .file { color:#d2a8ff; }
  .terminal-body .highlight { color:#ffa657; }
  .terminal-body .prompt { color:#6e7681; }

  /* Typing animation */
  .type-line { opacity:0; animation:typeFade 0.3s ease forwards; }

  @keyframes typeFade { to { opacity:1; } }

  /* File Tree */
  .file-tree {
    background:#0d1117; border:1px solid #21262d; border-radius:10px;
    padding:16px; font-family:'JetBrains Mono',monospace; font-size:0.72rem;
    line-height:1.8; color:#c9d1d9;
  }
  .file-tree .folder { color:#79c0ff; font-weight:600; }
  .file-tree .new-file { color:#3fb950; }
  .file-tree .modified { color:#d29922; }

  /* Cards Grid */
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; margin:16px 0; }
  .wt-card {
    background:#161b22; border:1px solid #21262d; border-radius:10px;
    padding:16px; position:relative; overflow:hidden;
  }
  .wt-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .wt-card.purple::before { background:linear-gradient(90deg,#6366f1,#8b5cf6); }
  .wt-card.green::before { background:linear-gradient(90deg,#059669,#34d399); }
  .wt-card.amber::before { background:linear-gradient(90deg,#d97706,#fbbf24); }
  .wt-card.blue::before { background:linear-gradient(90deg,#2563eb,#60a5fa); }
  .wt-card.pink::before { background:linear-gradient(90deg,#db2777,#f472b6); }
  .wt-card h4 { font-size:0.85rem; font-weight:600; color:#e2e8f0; margin-bottom:6px; }
  .wt-card p { font-size:0.75rem; color:#8b949e; line-height:1.4; }
  .wt-card .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.6rem; margin-top:8px; margin-right:4px; background:rgba(99,102,241,0.1); color:#a5b4fc; }

  /* Agent Badge */
  .agent-badge {
    display:inline-flex; align-items:center; gap:6px; padding:6px 12px;
    border-radius:8px; background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.2);
    margin:4px 4px 4px 0;
  }
  .agent-badge .dot { width:8px; height:8px; border-radius:50%; background:#6366f1; }
  .agent-badge .dot.active { background:#34d399; animation:pulse 1.5s infinite; }
  .agent-badge span { font-size:0.72rem; color:#a5b4fc; font-weight:500; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* Dashboard Mock */
  .dashboard-mock {
    background:#0d1117; border:1px solid #21262d; border-radius:10px;
    overflow:hidden; margin:16px 0;
  }
  .dash-nav {
    background:#161b22; padding:10px 16px; display:flex; align-items:center;
    justify-content:space-between; border-bottom:1px solid #21262d;
  }
  .dash-nav .logo { font-weight:700; color:#8b5cf6; font-size:0.85rem; }
  .dash-tabs { display:flex; gap:4px; }
  .dash-tab {
    padding:4px 12px; border-radius:6px; font-size:0.7rem; color:#8b949e;
    cursor:pointer; transition:all 0.2s;
  }
  .dash-tab.active { background:rgba(99,102,241,0.15); color:#a5b4fc; }
  .dash-content { padding:16px; }
  .progress-bar { height:6px; background:#21262d; border-radius:3px; margin:6px 0; overflow:hidden; }
  .progress-fill { height:100%; border-radius:3px; transition:width 0.5s; }
  .progress-fill.purple { background:linear-gradient(90deg,#6366f1,#8b5cf6); }
  .progress-fill.green { background:linear-gradient(90deg,#059669,#34d399); }

  /* Approval Gate */
  .approval-gate {
    background:rgba(245,158,11,0.08); border:2px dashed rgba(245,158,11,0.3);
    border-radius:12px; padding:20px; margin:16px 0; text-align:center;

  .approval-gate h3 { color:#fbbf24; font-size:1rem; margin-bottom:8px; }
  .approval-gate p { color:#94a3b8; font-size:0.85rem; margin-bottom:12px; }
  .approval-btns { display:flex; gap:10px; justify-content:center; }
  .btn-approve {
    padding:8px 24px; border-radius:8px; font-size:0.8rem; font-weight:600;
    cursor:pointer; border:none; transition:all 0.2s;
  }
  .btn-approve.yes { background:#059669; color:#fff; }
  .btn-approve.yes:hover { background:#047857; }
  .btn-approve.edit { background:rgba(245,158,11,0.2); color:#fbbf24; border:1px solid rgba(245,158,11,0.3); }
  .btn-approve.no { background:rgba(239,68,68,0.2); color:#f87171; border:1px solid rgba(239,68,68,0.3); }

  /* Artifact preview */
  .artifact {
    background:#0d1117; border:1px solid #21262d; border-radius:10px;
    margin:8px 0; overflow:hidden;
  }
  .artifact-header {
    background:#161b22; padding:6px 14px; display:flex; align-items:center;
    justify-content:space-between; border-bottom:1px solid #21262d;
  }
  .artifact-header .name { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:#d2a8ff; }
  .artifact-header .size { font-size:0.65rem; color:#6e7681; }
  .artifact-body { padding:12px 16px; font-size:0.72rem; color:#8b949e; line-height:1.6; }

  /* Bottom Nav */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    background:rgba(10,10,10,0.95); backdrop-filter:blur(20px);
    border-top:1px solid rgba(99,102,241,0.2);
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 24px; height:56px;
  }
  .nav-btn {
    padding:8px 20px; border-radius:8px; font-size:0.8rem; font-weight:500;
    cursor:pointer; border:none; transition:all 0.2s;
  }
  .nav-btn.prev { background:rgba(255,255,255,0.05); color:#94a3b8; }
  .nav-btn.prev:hover { background:rgba(255,255,255,0.1); color:#fff; }
  .nav-btn.next { background:#6366f1; color:#fff; }
  .nav-btn.next:hover { background:#4f46e5; }
  .nav-btn:disabled { opacity:0.3; cursor:default; }
  .auto-play {
    display:flex; align-items:center; gap:8px;
    font-size:0.75rem; color:#64748b;
  }
  .auto-play input { cursor:pointer; }

  /* Two columns */
  .cols-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:800px) { .cols-2 { grid-template-columns:1fr; } }

  /* Audit entry */
  .audit-entry {
    display:flex; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03);
    font-size:0.72rem;
  }
  .audit-entry .time { color:#6e7681; min-width:70px; font-family:'JetBrains Mono',monospace; }
  .audit-entry .event { color:#c9d1d9; }
  .audit-entry .hash { color:#6e7681; font-family:'JetBrains Mono',monospace; font-size:0.65rem; }
</style>
</head>

let current = 0;
let autoTimer = null;

function render() {
  const step = steps[current];
  document.getElementById('stepLabel').textContent = 'Etapa ' + (current + 1) + ' de ' + steps.length;

  // Timeline
  let tl = '';
  steps.forEach((s, i) => {
    const cls = i === current ? 'active' : i < current ? 'done' : '';
    tl += '<div class="timeline-dot ' + cls + '" onclick="goTo(' + i + ')">' + (i + 1) + '</div>';
    if (i < steps.length - 1) tl += '<div class="timeline-line ' + (i < current ? 'done' : '') + '"></div>';
  });
  document.getElementById('timelineBar').innerHTML = tl;

  // Content
  let html = '<div class="step active">';
  html += '<div class="step-header">';
  html += '<div class="step-phase ' + step.phase + '">' + step.phaseLabel + '</div>';
  html += '<div class="step-title">' + step.title + '</div>';
  html += '<div class="step-desc">' + step.desc + '</div>';
  html += '</div>';
  html += step.content;
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;

  document.getElementById('prevBtn').disabled = (current === 0);
  document.getElementById('nextBtn').disabled = (current === steps.length - 1);
}

function next() { if (current < steps.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function goTo(i) { current = i; render(); }

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

document.getElementById('autoPlay').addEventListener('change', function() {
  if (this.checked) {
    autoTimer = setInterval(() => {
      if (current < steps.length - 1) next();
      else { this.checked = false; clearInterval(autoTimer); }
    }, 5000);
  } else { clearInterval(autoTimer); }
});

render();
</script>
